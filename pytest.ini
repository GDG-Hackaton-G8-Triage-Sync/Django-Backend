[pytest]
DJANGO_SETTINGS_MODULE = triagesync_backend.config.settings
python_files = tests.py test_*.py *_tests.py

addopts = 
    --no-migrations
    -p no:warnings
    --strict-markers
    --tb=short
    -v

markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests